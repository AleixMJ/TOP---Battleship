<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aleix BattleShip</title>
</head>
<body>

    <header id="game-controls">
        <button id="new-game-btn">Setup New Game 🛠️</button>
    </header>
    <div id="game-container">
    


    <div id="game-status">Your Turn!</div>

    <div id="battle-view" class="view">
        <div id="game-wrapper">
            <div class="gameboard-wrapper player">
                <div class="columnLetters"></div>
                <div class="rowNumbers"></div>
                <div id="gameboard-container-player" class="grid-board"></div>
            </div>
            <div class="gameboard-wrapper opponent">
                <div class="columnLetters"></div>
                <div class="rowNumbers"></div>
                <div id="gameboard-container-opponent" class="grid-board"></div>
            </div>
        </div>
    </div>

    <div id="setup-view" class="view hidden">
    <p>Drag or click to position your ships on your board!</p>
    
    <div class="setup-layout">
        <div id="setup-board" class="grid-board"></div>
        
        <div id="dockyard">
            <div class="setup-ship" draggable="true" data-length="5" data-name="carrier"></div>
            <div class="setup-ship" draggable="true" data-length="4" data-name="battleship"></div>
            <div class="setup-ship" draggable="true" data-length="3" data-name="cruiser"></div>
            <div class="setup-ship" draggable="true" data-length="3" data-name="submarine"></div>
            <div class="setup-ship" draggable="true" data-length="2" data-name="destroyer"></div>
        </div> 
    </div>

    <button id="rotate-btn">Rotate Ships</button>

    <div class="difficulty-container">
        <label class="switch">
            <input type="checkbox" id="ai-difficulty-toggle" checked>
            <span class="slider round"></span>
        </label>
        <span id="difficulty-label">Smart AI Enabled</span>
    </div>
    
    <button id="start-battle-btn">Commence Battle!</button>
</div>

</div>


</body>
</html>
